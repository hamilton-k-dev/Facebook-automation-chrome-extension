<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logs — FB Auto Publisher</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">FB</div>
      <div class="sidebar-logo-text">Auto Publisher</div>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item">📊 Dashboard</a>
      <a href="options.html" class="nav-item">📝 Contents</a>
      <a href="groups.html" class="nav-item">👥 Groups</a>
      <a href="settings.html" class="nav-item">⚙️ Settings</a>
      <a href="logs.html" class="nav-item active">📋 Logs</a>
    </nav>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div class="topbar-title">Activity log</div>
      <div class="topbar-actions">
        <button class="btn btn-ghost btn-sm" id="btnTheme">🌙</button>
        <button class="btn btn-ghost" id="btnExportLogs">📥 Export CSV</button>
        <button class="btn btn-danger btn-sm" id="btnClearLogs">🗑️ Clear</button>
      </div>
    </div>

    <div class="page-content">
      <!-- Filters -->
      <div class="card mb-4" style="padding:14px;">
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          <input type="text" id="searchLogs" class="form-control" style="flex:1;min-width:200px;"
            placeholder="🔍 Search...">
          <div class="tabs" style="margin:0;border:none;">
            <button class="tab-btn active" data-filter="all">All</button>
            <button class="tab-btn" data-filter="success">Success</button>
            <button class="tab-btn" data-filter="error">Errors</button>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <label class="form-label" style="margin:0;white-space:nowrap;">Date:</label>
            <input type="date" id="filterDate" class="form-control" style="width:160px;">
          </div>
        </div>
      </div>

      <!-- Quick stats -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px;">
        <div class="stat-card">
          <div class="stat-value" id="logCountTotal">0</div>
          <div class="stat-label">Total entries</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:var(--success)" id="logCountSuccess">0</div>
          <div class="stat-label">Successes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" style="color:var(--danger)" id="logCountErrors">0</div>
          <div class="stat-label">Errors</div>
        </div>
      </div>

      <!-- Logs table -->
      <div class="card" style="overflow-x:auto;">
        <div id="logsTableContainer"></div>
        <div id="emptyLogs" class="empty-state" style="display:none;">
          <div class="empty-state-icon">📋</div>
          <div class="empty-state-text">No activity logged yet</div>
        </div>
      </div>

      <!-- Pagination -->
      <div id="pagination" style="display:flex;justify-content:center;gap:8px;margin-top:16px;"></div>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>
<script src="logs.js" type="module"></script>
</body>
</html>
